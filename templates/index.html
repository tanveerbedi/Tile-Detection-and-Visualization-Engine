<html>
<head>

<style>
    body{
        font-family: Arial, sans-serif;

        height:100vh;
    }

    .card{
        background:white;

        border:none;
        background:#007bff;
        color:white;
        border-radius:8px;
        cursor:pointer;
        width:100%;
    }

    button:hover{
        background:#0056b3;
    }

</head>

<form action="/upload" method="post" enctype="multipart/form-data">
