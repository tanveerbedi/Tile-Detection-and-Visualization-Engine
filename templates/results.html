</head>

<body>
<h2>Select a detected tile</h2>

<div class="grid">
{% for crop in crops %}
    <div class="tile">

        <!-- crop image -->
        <img src="/static/crops/{{ crop }}">

        <!-- form to send selected tile -->
        <form action="/select_tile" method="post">
            <input type="hidden" name="tile" value="{{ crop }}">
            <button type="submit">Select</button>
        </form>

    </div>
{% endfor %}
</div>
